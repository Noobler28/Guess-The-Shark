<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Playing Guess the Shark!</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="home-container">
        <h1>Thank You for Playing Guess the Shark!</h1>
        <img src="images/logo.png" alt="Game Logo" class="logo">
        
        <div class="score-container">
            <h2 id="final-score"></h2>
            <a href="index.html" class="start-button">Play Again</a>
        </div>

        <!-- New Score Sharing Section -->
        <div class="score-sharing">
            <h3 id="share-message"></h3>
            <p>Copy the message above and share it with your friends!</p>
        </div>

        <!-- Leaderboard Section -->
        <div class="leaderboard">
            <h2>Leaderboard</h2>
            <ul id="leaderboard-list"></ul>
        </div>
    </div>

    <script>
        // Get score from URL parameters
        const params = new URLSearchParams(window.location.search);
        const score = params.get('score');

        // Display final score
        const finalScoreText = `You guessed ${score}% correct!`;
        document.getElementById('final-score').innerText = finalScoreText;

        // Create share message
        const shareMessage = `I just scored ${score}% on Guess the Shark! play it here: https://noobler28.github.io/Guess-The-Shark/`;
        document.getElementById('share-message').innerText = shareMessage;

        // Fetch leaderboard data from the server and display it
        function fetchLeaderboard() {
            fetch('/leaderboard')
                .then(response => response.json())
                .then(leaderboard => {
                    const leaderboardList = document.getElementById('leaderboard-list');
                    leaderboardList.innerHTML = ''; // Clear any previous entries
                    leaderboard.forEach(entry => {
                        const listItem = document.createElement('li');
                        listItem.textContent = `${entry.name}: ${entry.score}%`;
                        leaderboardList.appendChild(listItem);
                    });
                })
                .catch(err => console.error('Error fetching leaderboard:', err));
        }

        // Send the player's name and score to the server to update the leaderboard
        function updateLeaderboard(playerName, playerScore) {
            const data = { name: playerName, score: playerScore };

            fetch('/leaderboard', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(message => {
                console.log(message);
                fetchLeaderboard(); // Refresh leaderboard after updating
            })
            .catch(err => console.error('Error updating leaderboard:', err));
        }

        // Prompt for player name and update leaderboard
        const playerName = prompt("Please enter your name:");
        if (playerName) {
            updateLeaderboard(playerName, score);
        }

        // Fetch and display the leaderboard on page load
        fetchLeaderboard();
    </script>
</body>
</html>
